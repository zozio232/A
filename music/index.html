<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AmaiCraft Jukebox</title>
    <style>
        :root {
            --mc-gui-panel: #c6c6c6;
            --mc-gui-button: #7e7e7e;
            --mc-border-dark: #555555;
            --mc-border-light: #ffffff;
        }

        body {
            background-image: url("Leaves.png");
            background-size: 64px;
            background-repeat: repeat;
            image-rendering: pixelated;
            font-family: sans-serif; /* Remplace par ta police Minecraft */
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- JUKEBOX CENTRAL --- */
        #jukebox-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #jukebox {
            width: 150px;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            image-rendering: pixelated;
        }

        #jukebox.active { transform: scale(1.1); }

        /* --- INVENTAIRE DES DISQUES --- */
        #inventory {
            background: var(--mc-gui-panel);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0 var(--mc-border-light), inset -4px -4px 0 var(--mc-border-dark);
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            z-index: 20;
        }

        .disc {
            width: 50px;
            height: 50px;
            cursor: grab;
            image-rendering: pixelated;
            user-select: none;
            -webkit-user-drag: element;
        }

        /* --- DISQUE ÉJECTÉ (Animation) --- */
        .ejected-disc {
            position: absolute;
            width: 40px;
            pointer-events: none;
            z-index: 5;
            image-rendering: pixelated;
        }

        .wiki-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
        }
    </style>
</head>
<body>

<a href="https://fr.minecraft.wiki/w/Disque" target="_blank" class="wiki-link">Wiki Disques</a>

<div id="jukebox-container">
    <img src="Jukebox.png" id="jukebox" alt="Jukebox">
</div>

<div id="inventory"></div>

<audio id="player" loop></audio>

<script>
    const jukebox = document.getElementById('jukebox');
    const player = document.getElementById('player');
    const inventory = document.getElementById('inventory');

    // Ta liste de disques basée sur ton image
    const discNames = [
        "5", "11", "13", "blocks", "cat", "chirp", "creator", "far", 
        "mall", "mellohi", "otherside", "pigstep", "relic", "stal", 
        "strad", "wait", "ward"
    ];

    let currentDiscImg = null;

    // --- 1. GÉNÉRATION AUTOMATIQUE DES DISQUES ---
    discNames.forEach(name => {
        const img = document.createElement('img');
        img.src = `Discs/${name}.png`;
        img.className = 'disc';
        img.draggable = true;
        img.dataset.audio = `Discs/${name}.mp3`;
        
        // Empêche le comportement par défaut du drag d'image
        img.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('audio', img.dataset.audio);
            e.dataTransfer.setData('imgSrc', img.src);
            
            // OPTIONNEL : On peut forcer l'image fantôme à être l'image elle-même 
            // pour éviter l'effet "fond blanc" de certains navigateurs
            e.dataTransfer.setDragImage(img, 25, 25); 
        });

        inventory.appendChild(img);
    });

    // --- 2. GESTION DU JUKEBOX ---
    jukebox.addEventListener('dragover', (e) => {
        e.preventDefault(); // Autorise le dépôt
        jukebox.style.filter = "brightness(1.2)";
    });

    jukebox.addEventListener('dragleave', () => {
        jukebox.style.filter = "none";
    });

    jukebox.addEventListener('drop', (e) => {
        e.preventDefault();
        jukebox.style.filter = "none";
        
        const audioSrc = e.dataTransfer.getData('audio');
        const imgSrc = e.dataTransfer.getData('imgSrc');

        if (audioSrc) {
            player.src = audioSrc;
            player.play();
            currentDiscImg = imgSrc;
            jukebox.classList.add('active');
            
            // Petit effet de vibration au dépôt
            jukebox.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.1)' },
                { transform: 'scale(1)' }
            ], { duration: 200 });
        }
    });

    // --- 3. ÉJECTION (LE BOND) ---
    jukebox.addEventListener('click', () => {
        if (!player.paused && currentDiscImg) {
            ejectDisc();
            player.pause();
            player.src = "";
            jukebox.classList.remove('active');
        }
    });

    function ejectDisc() {
        const disc = document.createElement('img');
        disc.src = currentDiscImg;
        disc.className = 'ejected-disc';
        
        const rect = jukebox.getBoundingClientRect();
        let posX = rect.left + rect.width / 2 - 20;
        let posY = rect.top + 20;
        
        // Physique du saut
        let velocityY = -12; // Force vers le haut
        let velocityX = (Math.random() - 0.5) * 8; // Dispersion gauche/droite
        const gravity = 0.5;

        document.body.appendChild(disc);

        function animate() {
            velocityY += gravity;
            posX += velocityX;
            posY += velocityY;

            disc.style.left = posX + 'px';
            disc.style.top = posY + 'px';
            disc.style.transform = `rotate(${posY * 2}deg)`;

            if (posY < window.innerHeight + 100) {
                requestAnimationFrame(animate);
            } else {
                disc.remove();
            }
        }
        animate();
    }
</script>

</body>
</html>
