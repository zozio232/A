<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>AmaiCraft Command Generator - Not Created Yet</title>

    <style>


        @font-face {
            font-family: 'Minecraftia';
            font-style: normal;
            font-weight: 400;
            src: local('Minecraftia'), url('../Minecraftia.woff') format('woff');
        }

        :root {

            --mc-gui-panel: #c6c6c6;

            --mc-gui-button: #7e7e7e;

            --mc-gui-shadow: #555555;

            --mc-gui-light: #ffffff;

            --mc-text-shadow: #3f3f3f;

        }

        body {
            font-family: 'Minecraftia', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            /* Texture de fond */
            background-image: url('dirt.webp'); 
            background-repeat: repeat;
            background-size: 64px;
            background-attachment: fixed;
            color: white;

            
        }

        header img {
            /* --- POSITIONNEMENT --- */
            position: absolute;
            right: 0;   /* Collé au mur de droite */
            top: 0;
            bottom: 0;
            
            /* --- TAILLE --- */
            height: 100%;
            width: auto;
        }
        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;

                /* --- AJOUT INDISPENSABLE --- */
            position: relative; /* Sert de repère pour le perroquet */
            overflow: hidden;    /* Empêche le perroquet de déborder si besoin */
            min-height: 70px;   /* Ajuste selon la taille de ton texte pour pas que ce soit trop plat */
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        /* NAV BAR STYLE BOUTONS MC */
        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            background: #8b8b8b;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
        }
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            background-color: #1a1a1a;
            color: #aaaaaa;
            border-top: 4px solid #000;
            z-index: 2000;
        }
    </style>

</head>

<body>
<header>
    <h1>AMAICRAFT</h1>
    <img src="../parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="../index.html">ACCUEIL</a>
    <a href="https://minecraft.wiki" target="_blank" rel="noopener noreferrer">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners" target="_blank" rel="noopener noreferrer">GUIDES</a>
</div>
<footer>
        <a href="https://ko-fi.com/amaicraft" target="_blank" style="color: #13c3ff; text-decoration: none;" rel="noopener noreferrer" id="Don">
            ☕ Buy me a Coffee
        </a> <br>
    <strong>Page communautaire 
        <a href="https://www.minecraft.net/" target="_blank" rel="noopener noreferrer" style="color:  #85b6ee; text-decoration: none; border-bottom: 1px solid transparent; background-image: linear-gradient(90deg, #ffffff 0%, #a8f0a5 100%); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%;">Minecraft</a></strong> — Site non officiel<br>
</footer>
</body>
<script>
        window.onload = function() {
        const Coff = document.getElementById('Don');
        const text = Coff.innerText;
        Coff.innerHTML = ''; // On vide le titre pour le reconstruire

        for (let char of text) {
            const span = document.createElement('span');
            span.innerText = char;
            
            // Génération d'une couleur pastel
            // On reste sur des valeurs hautes (entre 127 et 255) pour garder de la clarté
            const hue = Math.floor(Math.random() * 360);
            const color = `hsl(${hue}, 100%, 80%)`;
            span.style.color = color;
            span.style.textDecoration = 'underline';
            span.style.textDecorationColor = color;
            span.style.textDecorationThickness = '2px';
            
            Coff.appendChild(span);
        }
    };
</script>
</html>
